<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Cards</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🛍️ Trending Products</h1>

<div class="container">

    <!-- Product 1 -->
    <div class="card">
        <div class="image-box">
            <img src="laptop.jpg" alt="Laptop">
        </div>

        <h2>Laptop</h2>
        <p class="price">₹59,999</p>

        <span class="discount">20% OFF</span>

        <button>Buy Now</button>
    </div>

    <!-- Product 2 -->
    <div class="card">
        <div class="image-box">
            <img src="phone.jpg" alt="Phone">
        </div>

        <h2>Smart Phone</h2>
        <p class="price">₹84,999</p>

        <span class="discount">15% OFF</span>

        <button>Buy Now</button>
    </div>

    <!-- Product 3 -->
    <div class="card">
        <div class="image-box">
            <img src="watch.jpg" alt="Watch">
        </div>

        <h2>Smart Watch</h2>
        <p class="price">₹3,999</p>

        <span class="discount">30% OFF</span>

        <button>Buy Now</button>
    </div>

    <!-- Product 4 -->
    <div class="card">
        <div class="image-box">
            <img src="headphone.jpg" alt="Headphones">
        </div>

        <h2>Headphones</h2>
        <p class="price">₹2,499</p>

        <span class="discount">25% OFF</span>

        <button>Buy Now</button>
    </div>

    <!-- Product 5 -->
    <div class="card">
        <div class="image-box">
            <img src="camera.jpg" alt="Camera">
        </div>

        <h2>DSLR Camera</h2>
        <p class="price">₹45,999</p>

        <span class="discount">18% OFF</span>

        <button>Buy Now</button>
    </div>

    <!-- Product 6 -->
    <div class="card">
        <div class="image-box">
            <img src="shoes.jpg" alt="Shoes">
        </div>

        <h2>Sports Shoes</h2>
        <p class="price">₹2,999</p>

        <span class="discount">35% OFF</span>

        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
